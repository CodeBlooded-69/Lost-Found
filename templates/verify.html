{% extends 'base.html' %} {% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card shadow border-0">
      <div class="card-header bg-white border-bottom-0 pt-4 text-center">
        <h3 class="fw-bold text-primary">Ownership Verification</h3>
        <p class="text-muted small">
          To prevent fraud, please verify your identity[cite: 136].
        </p>
      </div>
      <div class="card-body p-4">
        <div class="alert alert-light border d-flex align-items-center mb-4">
          <img
            src="{{ url_for('static', filename='uploads/' + item.image_file) }}"
            class="rounded me-3"
            width="60"
            height="60"
            style="object-fit: cover"
          />
          <div>
            <h6 class="mb-0 fw-bold">{{ item.name }}</h6>
            <small class="text-muted">Reported at: {{ item.location }}</small>
          </div>
        </div>

        <form action="/verify/{{ item.id }}" method="POST">
          <div class="mb-3">
            <label class="form-label fw-bold small"
              >STUDENT ID / STAFF ID</label
            >
            <input
              type="text"
              name="student_id"
              class="form-control"
              required
              placeholder="e.g. 2024AX99"
            />
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold small">PROOF OF OWNERSHIP</label>
            <textarea
              name="message"
              class="form-control"
              rows="4"
              required
              placeholder="Describe a unique feature (e.g., 'There is a scratch on the bottom left corner' or 'The wallpaper is a dog')."
            ></textarea>
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg rounded-pill">
              <i class="bi bi-shield-lock-fill me-2"></i> Submit & Start Chat
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
