{% extends 'base.html' %} {% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5 text-center">
    <div class="card shadow-lg border-0 rounded-4 p-5">
      <div class="mb-4">
        <i class="bi bi-shield-lock-fill display-1 text-success"></i>
      </div>

      <h3 class="fw-bold mb-2">Secure Claim</h3>
      <p class="text-muted mb-4">
        Meeting the finder? Ask for their <strong>4-digit PIN</strong> and enter
        it here to confirm you got your item.
      </p>

      <form method="POST">
        <div class="mb-4">
          <input
            type="text"
            name="pin"
            class="form-control form-control-lg text-center fw-bold fs-1 bg-light"
            placeholder="0000"
            maxlength="4"
            required
            autocomplete="off"
            style="letter-spacing: 5px"
          />
        </div>

        <button
          type="submit"
          class="btn btn-success w-100 py-3 rounded-pill fw-bold shadow-sm"
        >
          <i class="bi bi-check-circle-fill me-2"></i> Confirm Receipt
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
